<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diet App - UI Mockup</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #ECEFF1;
    min-height: 100vh;
    font-family: 'Segoe UI', system-ui, sans-serif;
    padding: 40px 20px 60px;
  }

  h1 {
    text-align: center;
    font-size: 28px;
    font-weight: 800;
    color: #1a1a1a;
    margin-bottom: 6px;
  }
  .subtitle {
    text-align: center;
    font-size: 14px;
    color: #888;
    margin-bottom: 40px;
  }

  .screens-row {
    display: flex;
    gap: 32px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .screen-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
  }

  .screen-label {
    font-size: 13px;
    font-weight: 700;
    color: #555;
    background: #fff;
    padding: 6px 18px;
    border-radius: 20px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  }

  iframe {
    width: 390px;
    height: 844px;
    border: none;
    border-radius: 48px;
    box-shadow: 0 32px 80px rgba(0,0,0,0.2);
  }
</style>
</head>
<body>
  <h1>🥗 Diet App UI Mockup</h1>
  <p class="subtitle">Google App Architecture 스터디 · Jetpack Compose + Material3</p>

  <div class="screens-row">
    <div class="screen-wrap">
      <div class="screen-label">🏠 Home</div>
      <iframe src="home.html"></iframe>
    </div>
    <div class="screen-wrap">
      <div class="screen-label">📋 Diary</div>
      <iframe src="diary.html"></iframe>
    </div>
    <div class="screen-wrap">
      <div class="screen-label">📊 Analysis</div>
      <iframe src="analysis.html"></iframe>
    </div>
    <div class="screen-wrap">
      <div class="screen-label">⚙️ Settings</div>
      <iframe src="settings.html"></iframe>
    </div>
  </div>
</body>
</html>
