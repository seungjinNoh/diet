<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diet App - Home</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #f5f5f5;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Segoe UI', system-ui, sans-serif;
  }

  .phone {
    width: 390px;
    height: 844px;
    background: #fff;
    border-radius: 48px;
    box-shadow: 0 32px 80px rgba(0,0,0,0.25);
    overflow: hidden;
    position: relative;
    border: 10px solid #1a1a1a;
  }

  .status-bar {
    background: #fff;
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    font-size: 12px;
    font-weight: 600;
    color: #1a1a1a;
  }

  .status-bar .time { font-size: 15px; font-weight: 700; }
  .status-icons { display: flex; gap: 6px; align-items: center; }
  .status-icons svg { width: 16px; height: 16px; }

  .screen {
    height: calc(844px - 44px - 82px);
    overflow-y: auto;
    background: #FAFAFA;
    scrollbar-width: none;
  }
  .screen::-webkit-scrollbar { display: none; }

  /* Top App Bar */
  .top-bar {
    background: #fff;
    padding: 12px 20px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid #f0f0f0;
  }
  .top-bar .greeting { font-size: 13px; color: #888; }
  .top-bar .date { font-size: 18px; font-weight: 700; color: #1a1a1a; }
  .top-bar .avatar {
    width: 38px; height: 38px;
    border-radius: 50%;
    background: linear-gradient(135deg, #4CAF50, #8BC34A);
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-weight: 700; font-size: 16px;
  }

  /* Calorie Ring Section */
  .calorie-section {
    background: #fff;
    margin: 12px 16px;
    border-radius: 20px;
    padding: 20px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  }

  .section-title {
    font-size: 13px;
    font-weight: 600;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 16px;
  }

  .ring-container {
    display: flex;
    align-items: center;
    gap: 20px;
  }

  .ring-wrap {
    position: relative;
    width: 120px;
    height: 120px;
    flex-shrink: 0;
  }

  .ring-wrap svg {
    width: 120px;
    height: 120px;
    transform: rotate(-90deg);
  }

  .ring-bg { fill: none; stroke: #f0f0f0; stroke-width: 10; }
  .ring-fill {
    fill: none;
    stroke: #4CAF50;
    stroke-width: 10;
    stroke-linecap: round;
    stroke-dasharray: 283;
    stroke-dashoffset: 90; /* 68% */
    transition: stroke-dashoffset 1s ease;
  }

  .ring-center {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
  }
  .ring-center .kcal-num { font-size: 22px; font-weight: 800; color: #1a1a1a; }
  .ring-center .kcal-label { font-size: 10px; color: #aaa; font-weight: 500; }

  .calorie-info { flex: 1; }
  .calorie-goal {
    display: flex;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  .calorie-item { text-align: center; }
  .calorie-item .val { font-size: 16px; font-weight: 700; color: #1a1a1a; }
  .calorie-item .lbl { font-size: 11px; color: #aaa; margin-top: 2px; }
  .calorie-item.consumed .val { color: #4CAF50; }
  .calorie-item.remain .val { color: #FF9800; }

  .divider-v { width: 1px; background: #f0f0f0; }

  /* Macro Bars */
  .macro-section {
    background: #fff;
    margin: 0 16px 12px;
    border-radius: 20px;
    padding: 16px 20px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  }

  .macro-row {
    display: flex;
    align-items: center;
    margin-bottom: 12px;
    gap: 10px;
  }
  .macro-row:last-child { margin-bottom: 0; }

  .macro-name {
    width: 28px;
    font-size: 12px;
    font-weight: 600;
    color: #555;
  }

  .macro-bar-wrap {
    flex: 1;
    height: 8px;
    background: #f0f0f0;
    border-radius: 4px;
    overflow: hidden;
  }
  .macro-bar {
    height: 100%;
    border-radius: 4px;
    transition: width 1s ease;
  }
  .macro-bar.carb { background: #FF9800; }
  .macro-bar.protein { background: #2196F3; }
  .macro-bar.fat { background: #F44336; }
  .macro-bar.fiber { background: #9C27B0; }

  .macro-val {
    font-size: 12px;
    font-weight: 600;
    color: #555;
    width: 52px;
    text-align: right;
  }

  /* Meal Cards */
  .meals-section {
    margin: 0 16px 12px;
  }

  .meals-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
    padding: 0 4px;
  }
  .meals-header span { font-size: 15px; font-weight: 700; color: #1a1a1a; }
  .meals-header a { font-size: 12px; color: #4CAF50; font-weight: 600; }

  .meal-card {
    background: #fff;
    border-radius: 16px;
    padding: 14px 16px;
    margin-bottom: 8px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .meal-icon {
    width: 42px; height: 42px;
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }
  .meal-icon.breakfast { background: #FFF3E0; }
  .meal-icon.lunch { background: #E8F5E9; }
  .meal-icon.dinner { background: #E3F2FD; }
  .meal-icon.snack { background: #F3E5F5; }

  .meal-info { flex: 1; }
  .meal-name { font-size: 14px; font-weight: 700; color: #1a1a1a; }
  .meal-foods { font-size: 12px; color: #aaa; margin-top: 2px; }

  .meal-right { text-align: right; }
  .meal-kcal { font-size: 15px; font-weight: 700; color: #1a1a1a; }
  .meal-kcal span { font-size: 11px; color: #aaa; font-weight: 400; }

  .meal-add {
    background: #f8f8f8;
    border-radius: 16px;
    padding: 14px 16px;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 12px;
    border: 2px dashed #e0e0e0;
  }
  .meal-add .add-icon {
    width: 42px; height: 42px;
    border-radius: 12px;
    background: #f0f0f0;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; color: #bbb;
  }
  .meal-add .add-text { font-size: 14px; color: #bbb; font-weight: 500; }

  /* Weekly Chart */
  .chart-section {
    background: #fff;
    margin: 0 16px 12px;
    border-radius: 20px;
    padding: 16px 20px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  }

  .chart-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }
  .chart-title { font-size: 15px; font-weight: 700; color: #1a1a1a; }
  .chart-avg {
    font-size: 12px;
    color: #888;
    background: #f5f5f5;
    padding: 4px 10px;
    border-radius: 20px;
  }

  .bar-chart {
    display: flex;
    align-items: flex-end;
    gap: 6px;
    height: 80px;
  }

  .bar-group {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }

  .bar {
    width: 100%;
    border-radius: 6px 6px 0 0;
    transition: height 1s ease;
  }
  .bar.achieved { background: #4CAF50; }
  .bar.over { background: #FF5722; }
  .bar.today { background: #4CAF50; box-shadow: 0 0 8px rgba(76,175,80,0.5); }
  .bar.empty { background: #f0f0f0; }

  .bar-day { font-size: 10px; color: #aaa; font-weight: 500; }

  /* Bottom Navigation */
  .bottom-nav {
    height: 82px;
    background: #fff;
    border-top: 1px solid #f0f0f0;
    display: flex;
    align-items: center;
    justify-content: space-around;
    padding-bottom: 16px;
  }

  .nav-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    flex: 1;
    cursor: pointer;
  }

  .nav-icon {
    width: 24px; height: 24px;
    display: flex; align-items: center; justify-content: center;
  }
  .nav-icon svg { width: 24px; height: 24px; }

  .nav-label { font-size: 11px; font-weight: 500; color: #bbb; }
  .nav-item.active .nav-label { color: #4CAF50; font-weight: 700; }
  .nav-item.active .nav-icon svg { stroke: #4CAF50; }
  .nav-item:not(.active) .nav-icon svg { stroke: #bbb; }

  .goal-line {
    position: absolute;
    width: 100%;
    height: 1px;
    background: rgba(255,87,34,0.3);
    border-top: 1px dashed rgba(255,87,34,0.6);
    bottom: calc(80px * 0.75); /* 목표 칼로리 75% 위치 */
  }

  .bar-chart-wrap { position: relative; }

  .chip {
    display: inline-block;
    background: #E8F5E9;
    color: #4CAF50;
    font-size: 11px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 20px;
  }
</style>
</head>
<body>

<div class="phone">
  <!-- Status Bar -->
  <div class="status-bar">
    <span class="time">9:41</span>
    <div class="status-icons">
      <svg viewBox="0 0 24 24" fill="none" stroke="#1a1a1a" stroke-width="2">
        <path d="M1 1l22 22M16.72 11.06A10.94 10.94 0 0119 12.55M5 12.55a10.94 10.94 0 015.17-2.39M10.71 5.05A16 16 0 0122.56 9M1.42 9a15.91 15.91 0 014.7-2.88M8.53 16.11a6 6 0 016.95 0M12 20h.01"/>
      </svg>
      <svg viewBox="0 0 24 24" fill="none" stroke="#1a1a1a" stroke-width="2">
        <rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v2"/>
      </svg>
    </div>
  </div>

  <!-- Screen -->
  <div class="screen">

    <!-- Top App Bar -->
    <div class="top-bar">
      <div>
        <div class="greeting">좋은 아침이에요 👋</div>
        <div class="date">2월 28일 금요일</div>
      </div>
      <div class="avatar">N</div>
    </div>

    <!-- Calorie Ring Card -->
    <div class="calorie-section">
      <div class="section-title">오늘의 칼로리</div>
      <div class="ring-container">
        <div class="ring-wrap">
          <svg viewBox="0 0 100 100">
            <circle class="ring-bg" cx="50" cy="50" r="45"/>
            <circle class="ring-fill" cx="50" cy="50" r="45"/>
          </svg>
          <div class="ring-center">
            <div class="kcal-num">1,240</div>
            <div class="kcal-label">kcal</div>
          </div>
        </div>
        <div class="calorie-info">
          <div class="calorie-goal">
            <div class="calorie-item consumed">
              <div class="val">1,240</div>
              <div class="lbl">섭취</div>
            </div>
            <div class="divider-v"></div>
            <div class="calorie-item">
              <div class="val">2,000</div>
              <div class="lbl">목표</div>
            </div>
            <div class="divider-v"></div>
            <div class="calorie-item remain">
              <div class="val">760</div>
              <div class="lbl">남은</div>
            </div>
          </div>
          <div style="text-align:center">
            <span class="chip">목표의 62% 달성</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Macro Bars -->
    <div class="macro-section">
      <div class="section-title">영양소</div>
      <div class="macro-row">
        <div class="macro-name">탄수</div>
        <div class="macro-bar-wrap">
          <div class="macro-bar carb" style="width: 65%"></div>
        </div>
        <div class="macro-val" style="color:#FF9800">156 / 250g</div>
      </div>
      <div class="macro-row">
        <div class="macro-name">단백</div>
        <div class="macro-bar-wrap">
          <div class="macro-bar protein" style="width: 72%"></div>
        </div>
        <div class="macro-val" style="color:#2196F3">72 / 100g</div>
      </div>
      <div class="macro-row">
        <div class="macro-name">지방</div>
        <div class="macro-bar-wrap">
          <div class="macro-bar fat" style="width: 48%"></div>
        </div>
        <div class="macro-val" style="color:#F44336">32 / 67g</div>
      </div>
      <div class="macro-row">
        <div class="macro-name">식이</div>
        <div class="macro-bar-wrap">
          <div class="macro-bar fiber" style="width: 55%"></div>
        </div>
        <div class="macro-val" style="color:#9C27B0">14 / 25g</div>
      </div>
    </div>

    <!-- Meals -->
    <div class="meals-section">
      <div class="meals-header">
        <span>끼니 기록</span>
        <a href="#">전체보기</a>
      </div>

      <!-- 아침 -->
      <div class="meal-card">
        <div class="meal-icon breakfast">🌅</div>
        <div class="meal-info">
          <div class="meal-name">아침</div>
          <div class="meal-foods">잡곡밥, 된장찌개, 계란후라이</div>
        </div>
        <div class="meal-right">
          <div class="meal-kcal">580 <span>kcal</span></div>
        </div>
      </div>

      <!-- 점심 -->
      <div class="meal-card">
        <div class="meal-icon lunch">☀️</div>
        <div class="meal-info">
          <div class="meal-name">점심</div>
          <div class="meal-foods">닭가슴살 샐러드, 고구마</div>
        </div>
        <div class="meal-right">
          <div class="meal-kcal">660 <span>kcal</span></div>
        </div>
      </div>

      <!-- 저녁 추가 -->
      <div class="meal-add">
        <div class="add-icon">+</div>
        <div class="add-text">저녁 기록하기</div>
      </div>

      <!-- 간식 추가 -->
      <div class="meal-add">
        <div class="add-icon">+</div>
        <div class="add-text">간식 기록하기</div>
      </div>
    </div>

    <!-- Weekly Chart -->
    <div class="chart-section">
      <div class="chart-header">
        <div class="chart-title">이번 주 칼로리</div>
        <div class="chart-avg">평균 1,820 kcal</div>
      </div>
      <div class="bar-chart-wrap">
        <div class="bar-chart">
          <div class="bar-group">
            <div class="bar achieved" style="height: 62px"></div>
            <div class="bar-day">월</div>
          </div>
          <div class="bar-group">
            <div class="bar over" style="height: 75px"></div>
            <div class="bar-day">화</div>
          </div>
          <div class="bar-group">
            <div class="bar achieved" style="height: 58px"></div>
            <div class="bar-day">수</div>
          </div>
          <div class="bar-group">
            <div class="bar achieved" style="height: 65px"></div>
            <div class="bar-day">목</div>
          </div>
          <div class="bar-group">
            <div class="bar today" style="height: 50px"></div>
            <div class="bar-day" style="color:#4CAF50;font-weight:700">오늘</div>
          </div>
          <div class="bar-group">
            <div class="bar empty" style="height: 0px"></div>
            <div class="bar-day">토</div>
          </div>
          <div class="bar-group">
            <div class="bar empty" style="height: 0px"></div>
            <div class="bar-day">일</div>
          </div>
        </div>
      </div>
    </div>

  </div><!-- end screen -->

  <!-- Bottom Navigation -->
  <div class="bottom-nav">
    <div class="nav-item active">
      <div class="nav-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
      </div>
      <div class="nav-label">홈</div>
    </div>
    <div class="nav-item">
      <div class="nav-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/>
        </svg>
      </div>
      <div class="nav-label">식단</div>
    </div>
    <div class="nav-item">
      <div class="nav-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/>
        </svg>
      </div>
      <div class="nav-label">분석</div>
    </div>
    <div class="nav-item">
      <div class="nav-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
        </svg>
      </div>
      <div class="nav-label">설정</div>
    </div>
  </div>

</div>

</body>
</html>
