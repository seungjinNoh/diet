<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diet App - Settings</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #f5f5f5;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Segoe UI', system-ui, sans-serif;
  }
  .phone {
    width: 390px;
    height: 844px;
    background: #fff;
    border-radius: 48px;
    box-shadow: 0 32px 80px rgba(0,0,0,0.25);
    overflow: hidden;
    position: relative;
    border: 10px solid #1a1a1a;
  }
  .status-bar {
    background: #fff;
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
  }
  .status-bar .time { font-size: 15px; font-weight: 700; color: #1a1a1a; }
  .screen {
    height: calc(844px - 44px - 82px);
    overflow-y: auto;
    background: #FAFAFA;
    scrollbar-width: none;
  }
  .screen::-webkit-scrollbar { display: none; }

  .top-bar {
    background: #fff;
    padding: 12px 20px;
    border-bottom: 1px solid #f0f0f0;
  }
  .top-bar .title { font-size: 20px; font-weight: 800; color: #1a1a1a; }

  /* Profile Card */
  .profile-card {
    background: linear-gradient(135deg, #4CAF50, #8BC34A);
    margin: 12px 16px;
    border-radius: 20px;
    padding: 20px;
    display: flex;
    align-items: center;
    gap: 14px;
    box-shadow: 0 4px 20px rgba(76,175,80,0.3);
  }
  .profile-avatar {
    width: 58px; height: 58px;
    border-radius: 18px;
    background: rgba(255,255,255,0.3);
    display: flex; align-items: center; justify-content: center;
    font-size: 26px; font-weight: 800; color: #fff;
    border: 2px solid rgba(255,255,255,0.5);
    flex-shrink: 0;
  }
  .profile-info .name { font-size: 17px; font-weight: 700; color: #fff; }
  .profile-info .email { font-size: 12px; color: rgba(255,255,255,0.8); margin-top: 2px; }
  .profile-edit {
    margin-left: auto;
    background: rgba(255,255,255,0.2);
    border-radius: 10px;
    padding: 6px 12px;
    font-size: 12px; font-weight: 600; color: #fff;
  }

  /* Stats Row */
  .stats-row {
    display: flex;
    gap: 10px;
    margin: 0 16px 12px;
  }
  .stat-card {
    flex: 1;
    background: #fff;
    border-radius: 14px;
    padding: 12px;
    text-align: center;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
  }
  .stat-card .stat-val { font-size: 17px; font-weight: 800; color: #1a1a1a; }
  .stat-card .stat-lbl { font-size: 10px; color: #aaa; margin-top: 3px; font-weight: 500; }

  /* Section Label */
  .section-label {
    font-size: 11px;
    font-weight: 700;
    color: #aaa;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    padding: 0 20px 8px;
  }

  /* Settings Group */
  .settings-group {
    background: #fff;
    margin: 0 16px 12px;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
  }
  .settings-item {
    display: flex;
    align-items: center;
    padding: 14px 16px;
    border-bottom: 1px solid #f8f8f8;
    gap: 12px;
  }
  .settings-item:last-child { border-bottom: none; }
  .item-icon {
    width: 34px; height: 34px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; flex-shrink: 0;
  }
  .item-content { flex: 1; }
  .item-title { font-size: 14px; font-weight: 600; color: #1a1a1a; }
  .item-sub { font-size: 11px; color: #aaa; margin-top: 2px; }
  .item-right { display: flex; align-items: center; gap: 6px; }
  .item-val { font-size: 13px; color: #888; font-weight: 500; }
  .chevron svg { width: 16px; height: 16px; stroke: #ccc; stroke-width: 2.5; }

  /* Toggle */
  .toggle {
    width: 44px; height: 24px;
    border-radius: 12px;
    background: #4CAF50;
    position: relative;
    flex-shrink: 0;
  }
  .toggle.off { background: #e0e0e0; }
  .toggle::after {
    content: '';
    position: absolute;
    width: 20px; height: 20px;
    border-radius: 50%;
    background: #fff;
    top: 2px; right: 2px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.2);
  }
  .toggle.off::after { right: auto; left: 2px; }

  /* Goal Slider visual */
  .slider-wrap {
    margin: 0 16px 12px;
    background: #fff;
    border-radius: 16px;
    padding: 16px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
  }
  .slider-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 12px;
  }
  .slider-title { font-size: 14px; font-weight: 700; color: #1a1a1a; }
  .slider-val { font-size: 16px; font-weight: 800; color: #4CAF50; }
  .slider-unit { font-size: 12px; color: #aaa; }

  .slider-track {
    height: 6px;
    background: #f0f0f0;
    border-radius: 3px;
    position: relative;
    margin-bottom: 8px;
  }
  .slider-fill {
    height: 100%;
    background: #4CAF50;
    border-radius: 3px;
    width: 60%;
  }
  .slider-thumb {
    position: absolute;
    width: 20px; height: 20px;
    border-radius: 50%;
    background: #fff;
    border: 3px solid #4CAF50;
    top: 50%; left: 60%;
    transform: translate(-50%, -50%);
    box-shadow: 0 2px 8px rgba(76,175,80,0.3);
  }
  .slider-labels {
    display: flex; justify-content: space-between;
    font-size: 10px; color: #ccc;
  }

  /* Macro Goal Bars */
  .macro-goal-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }
  .macro-goal-row:last-child { margin-bottom: 0; }
  .mg-name { width: 32px; font-size: 12px; font-weight: 600; color: #555; }
  .mg-track {
    flex: 1; height: 8px;
    background: #f0f0f0; border-radius: 4px;
    position: relative; overflow: visible;
  }
  .mg-fill { height: 100%; border-radius: 4px; }
  .mg-val { font-size: 12px; font-weight: 600; width: 40px; text-align: right; color: #888; }

  /* Danger zone */
  .danger-item .item-title { color: #F44336; }
  .danger-item .item-icon { background: #FFEBEE; }

  /* Bottom Nav */
  .bottom-nav {
    height: 82px;
    background: #fff;
    border-top: 1px solid #f0f0f0;
    display: flex;
    align-items: center;
    justify-content: space-around;
    padding-bottom: 16px;
  }
  .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; flex: 1; }
  .nav-icon svg { width: 24px; height: 24px; fill: none; }
  .nav-label { font-size: 11px; font-weight: 500; color: #bbb; }
  .nav-item.active .nav-label { color: #4CAF50; font-weight: 700; }
</style>
</head>
<body>
<div class="phone">
  <div class="status-bar">
    <span class="time">9:41</span>
    <span style="font-size:12px;color:#888">●●●</span>
  </div>

  <div class="screen">
    <div class="top-bar">
      <div class="title">설정</div>
    </div>

    <!-- Profile Card -->
    <div class="profile-card">
      <div class="profile-avatar">N</div>
      <div class="profile-info">
        <div class="name">노승진</div>
        <div class="email">noh@example.com</div>
      </div>
      <div class="profile-edit">편집</div>
    </div>

    <!-- Stats -->
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-val">28일</div>
        <div class="stat-lbl">연속 기록</div>
      </div>
      <div class="stat-card">
        <div class="stat-val">73%</div>
        <div class="stat-lbl">목표 달성률</div>
      </div>
      <div class="stat-card">
        <div class="stat-val">124개</div>
        <div class="stat-lbl">등록된 음식</div>
      </div>
    </div>

    <!-- Calorie Goal -->
    <div class="section-label">목표 설정</div>
    <div class="slider-wrap">
      <div class="slider-header">
        <div class="slider-title">일일 칼로리 목표</div>
        <div><span class="slider-val">2,000</span> <span class="slider-unit">kcal</span></div>
      </div>
      <div class="slider-track">
        <div class="slider-fill"></div>
        <div class="slider-thumb"></div>
      </div>
      <div class="slider-labels">
        <span>1,200 kcal</span>
        <span>3,500 kcal</span>
      </div>
    </div>

    <!-- Macro Goals -->
    <div class="settings-group" style="padding: 14px 16px">
      <div class="item-title" style="margin-bottom:12px">매크로 목표</div>
      <div class="macro-goal-row">
        <div class="mg-name">탄수</div>
        <div class="mg-track">
          <div class="mg-fill" style="width:60%;background:#FF9800"></div>
        </div>
        <div class="mg-val" style="color:#FF9800">250g</div>
      </div>
      <div class="macro-goal-row">
        <div class="mg-name">단백</div>
        <div class="mg-track">
          <div class="mg-fill" style="width:40%;background:#2196F3"></div>
        </div>
        <div class="mg-val" style="color:#2196F3">100g</div>
      </div>
      <div class="macro-goal-row">
        <div class="mg-name">지방</div>
        <div class="mg-track">
          <div class="mg-fill" style="width:28%;background:#F44336"></div>
        </div>
        <div class="mg-val" style="color:#F44336">67g</div>
      </div>
    </div>

    <!-- Notifications -->
    <div class="section-label">알림</div>
    <div class="settings-group">
      <div class="settings-item">
        <div class="item-icon" style="background:#E3F2FD">🔔</div>
        <div class="item-content">
          <div class="item-title">식사 알림</div>
          <div class="item-sub">아침 8:00 · 점심 12:00 · 저녁 18:00</div>
        </div>
        <div class="toggle"></div>
      </div>
      <div class="settings-item">
        <div class="item-icon" style="background:#F3E5F5">📊</div>
        <div class="item-content">
          <div class="item-title">주간 리포트</div>
          <div class="item-sub">매주 일요일 오전 9시</div>
        </div>
        <div class="toggle"></div>
      </div>
      <div class="settings-item">
        <div class="item-icon" style="background:#E8F5E9">🎯</div>
        <div class="item-content">
          <div class="item-title">목표 초과 알림</div>
          <div class="item-sub">칼로리 목표 초과 시</div>
        </div>
        <div class="toggle off"></div>
      </div>
    </div>

    <!-- Account -->
    <div class="section-label">계정</div>
    <div class="settings-group">
      <div class="settings-item">
        <div class="item-icon" style="background:#E8F5E9">👤</div>
        <div class="item-content">
          <div class="item-title">계정 설정</div>
          <div class="item-sub">프로필 수정, 비밀번호 변경</div>
        </div>
        <div class="chevron"><svg viewBox="0 0 24 24" fill="none"><polyline points="9 18 15 12 9 6"/></svg></div>
      </div>
      <div class="settings-item">
        <div class="item-icon" style="background:#F3E5F5">🌙</div>
        <div class="item-content">
          <div class="item-title">다크 모드</div>
          <div class="item-sub">시스템 설정 따름</div>
        </div>
        <div class="item-right">
          <div class="item-val">자동</div>
          <div class="chevron"><svg viewBox="0 0 24 24" fill="none"><polyline points="9 18 15 12 9 6"/></svg></div>
        </div>
      </div>
    </div>


    <div style="height:16px"></div>
  </div>

  <!-- Bottom Nav -->
  <div class="bottom-nav">
    <div class="nav-item">
      <div class="nav-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="stroke:#bbb">
          <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
      </div>
      <div class="nav-label">홈</div>
    </div>
    <div class="nav-item">
      <div class="nav-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="stroke:#bbb">
          <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/>
        </svg>
      </div>
      <div class="nav-label">식단</div>
    </div>
    <div class="nav-item">
      <div class="nav-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" style="stroke:#bbb">
          <line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/>
        </svg>
      </div>
      <div class="nav-label">분석</div>
    </div>
    <div class="nav-item active">
      <div class="nav-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" style="stroke:#4CAF50">
          <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
        </svg>
      </div>
      <div class="nav-label">설정</div>
    </div>
  </div>
</div>
</body>
</html>
